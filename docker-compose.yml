services:
  markbase:
    build: .
    ports:
      - "${MARKBASE_PORT:-8000}:8000"
    volumes:
      - markbase_library:/data/library
      - markbase_state:/data/state
    environment:
      - MARKBASE_LIBRARY_PATH=/data/library
      - MARKBASE_STATE_PATH=/data/state
      - MARKBASE_HOST=0.0.0.0
      - MARKBASE_PORT=8000
    restart: unless-stopped

volumes:
  markbase_library:
  markbase_state:
